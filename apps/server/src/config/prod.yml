# ToB tenant platform production config
app:
  prefix: '/prod-api'
  port: 8081
  logger:
    dir: '/www/wwwlogs/admintenant.care.zbcare.cn'
  file:
    isLocal: false
    location: '/www/wwwroot/admintenant.care.zbcare.cn/server/upload'
    domain: 'https://admintenant.care.zbcare.cn'
    serveRoot: '/upload'
    maxSize: 10

oss:
  secretId: '${TOB_OSS_SECRET_ID}'
  secretKey: '${TOB_OSS_SECRET_KEY}'
  bucket: '${TOB_OSS_BUCKET}'
  region: 'oss-cn-beijing'
  domain: '${TOB_OSS_DOMAIN}'
  location: 'upload'

db:
  postgres:
    host: '${TOB_POSTGRES_HOST:-101.133.170.55}'
    username: '${TOB_POSTGRES_USER:-tenant_admin}'
    password: '${TOB_POSTGRES_PASSWORD}'
    database: '${TOB_POSTGRES_DATABASE:-carebook_tenant}'
    port: ${TOB_POSTGRES_PORT:-5432}
    logger: 'file'
    logging: false
    dropSchema: false
    synchronize: false

redis:
  host: 'localhost'
  password: '${TOB_REDIS_PASSWORD}'
  port: 6379
  db: 3
  keyPrefix: 'tob:'

jwt:
  secretkey: '${TOB_JWT_SECRET}'
  expiresin: '1h'
  refreshExpiresIn: '2h'

perm:
  router:
    whitelist:
      [
        { path: '/captchaImage', method: 'GET' },
        { path: '/registerUser', method: 'GET' },
        { path: '/register', method: 'POST' },
        { path: '/login', method: 'POST' },
        { path: '/refresh-token', method: 'POST' },
        { path: '/logout', method: 'POST' },
        { path: '/perm/{id}', method: 'GET' },
        { path: '/upload', method: 'POST' },
        { path: '/hardware/badge/callback', method: 'POST' },
      ]

hardwareAudio:
  apiBaseUrl: 'https://api.yuehangyi.com/'
  appId: '${TOB_HARDWARE_APP_ID}'
  appSecret: '${TOB_HARDWARE_APP_SECRET}'
  callbackSecret: '${TOB_HARDWARE_CALLBACK_SECRET}'
  publicDomain: 'https://admintenant.care.zbcare.cn'
  ossPrefix: 'hardware-audio'

dashscope:
  apiKey: 'sk-ws-H.RYIMRXP.7Gnz.MEUCIEcGZBohs4R5h8YTxn4cstkS71W19WZrJsmlc8q5LsqHAiEAmukvcbCFXaRCXJiQiwbKarzMkzdcmVlSjFMt90_f814'
  asrModel: 'fun-asr'
  baseUrl: 'https://dashscope.aliyuncs.com'

dify:
  baseUrl: '${TOB_DIFY_BASE_URL}'
  badgeDailyReportKey: '${TOB_DIFY_BADGE_DAILY_REPORT_KEY}'

user:
  initialPassword: '123456'
